services:
  - type: web
    name: ncaa-player-pool
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ncaa-pool-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: ncaa-pool-db
    databaseName: ncaa_pool
    user: ncaa_pool_user
    plan: free
