<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIG Convertibles NCAA Tournament Player Pool 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- ── Top Header ──────────────────────────────────────────── -->
    <header id="top-header">
      <div id="header-left">
        <span class="trophy">🏆</span>
        <h1>SIG Convertibles NCAA Tournament Player Pool <span class="year">2026</span></h1>
      </div>
      <div id="header-right">
        <span id="last-updated-label">Last updated: <span id="last-updated-time">—</span></span>
        <span id="live-indicator" class="hidden"><span class="pulse-dot"></span> LIVE</span>
      </div>
    </header>

    <!-- ── Alert Banner ────────────────────────────────────────── -->
    <div id="alert-banner" class="hidden">
      <span id="alert-icon"></span>
      <span id="alert-message"></span>
      <div id="alert-actions">
        <span id="alert-more" class="hidden"></span>
        <button id="alert-dismiss" aria-label="Dismiss">×</button>
      </div>
    </div>

    <!-- ── Alert History Drawer ─────────────────────────────────── -->
    <div id="alert-drawer" class="hidden">
      <div id="alert-drawer-header">
        Recent Alerts
        <button id="alert-drawer-close">×</button>
      </div>
      <div id="alert-drawer-list"></div>
    </div>

    <!-- ── Main Layout ─────────────────────────────────────────── -->
    <div id="main-layout">

      <!-- ── Left Sidebar ──────────────────────────────────────── -->
      <aside id="sidebar">
        <div id="sidebar-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Tournament Games
        </div>
        <div id="games-list">
          <div class="loading-msg">Loading games...</div>
        </div>
      </aside>

      <!-- ── Main Content ───────────────────────────────────────── -->
      <main id="content">

        <!-- Leaderboard + Commentary Row -->
        <div id="top-row">

          <!-- Leaderboard (vertical) -->
          <section id="leaderboard-section">
            <h2 class="section-title">Leaderboard</h2>
            <div id="leaderboard-strip">
              <div class="loading-msg">Loading standings...</div>
            </div>
          </section>

          <!-- Tournament Commentary -->
          <section id="commentary-section">
            <div id="commentary-header">
              <h2 class="section-title">Tournament Commentary</h2>
              <div id="commentary-meta">
                <span id="commentary-timestamp"></span>
                <button id="commentary-regen-btn" title="Regenerate commentary">↺ Regenerate</button>
              </div>
            </div>
            <div id="commentary-narrative">
              <div class="loading-msg">Commentary generates every 2 hours on game days...</div>
            </div>
            <div id="commentary-picks" class="hidden"></div>
          </section>

        </div>

        <!-- Team Cards Grid -->
        <section id="cards-section">
          <h2 class="section-title">Team Rosters</h2>
          <div id="cards-grid">
            <div class="loading-msg">Loading team cards...</div>
          </div>
        </section>

      </main>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
